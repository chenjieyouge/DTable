<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTable 测试 - Client/Server/Client-api 模式对比</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      padding: 20px;
      background: #f5f5f5;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #333; }
    
    .mode-selector {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .mode-selector h2 { margin-bottom: 15px; font-size: 18px; }
    .mode-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
    .mode-btn {
      padding: 10px 20px;
      border: 2px solid #1890ff;
      background: white;
      color: #1890ff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .mode-btn:hover { background: #e6f7ff; }
    .mode-btn.active { background: #1890ff; color: white; }
    
    .info-box {
      background: #e6f7ff;
      border-left: 4px solid #1890ff;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
    }
    .info-box strong { color: #1890ff; }
    
    .table-section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .table-section h3 { 
      margin-bottom: 15px; 
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-client { background: #52c41a; color: white; }
    .badge-server { background: #1890ff; color: white; }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .controls input {
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
      flex: 1;
      min-width: 200px;
    }
    .controls button {
      padding: 8px 16px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    .controls button:hover { background: #40a9ff; }
    .controls button.secondary {
      background: #fff;
      color: #1890ff;
      border: 1px solid #1890ff;
    }
    .controls button.secondary:hover { background: #e6f7ff; }
    
    #table-container { min-height: 500px; }
    
    .stats {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      padding: 15px;
      background: #fafafa;
      border-radius: 4px;
      font-size: 14px;
    }
    .stat-item { display: flex; flex-direction: column; }
    .stat-label { color: #999; margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 600; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 DTable 测试 - Client/Server/Client-api 模式对比</h1>
    
    <!-- 模式选择器 -->
    <div class="mode-selector">
      <h2>选择测试模式</h2>
      <div class="mode-buttons">
        <button class="mode-btn active" data-mode="client">
          📦 Client 模式（本地数据）
        </button>
        <button class="mode-btn" data-mode="client-api">
          🔄 Client+API 模式（后端一次性加载）
        </button>
        <button class="mode-btn" data-mode="server">
          🌐 Server 模式（后端 API）
        </button>
      </div>
      <div class="info-box" id="mode-info">
        <strong>Client 模式：</strong>使用 50 万条本地数据，前端内存计算排序/筛选，适合中小数据量
      </div>
    </div>
    
    <!-- 表格区域 -->
    <div class="table-section">
      <h3>
        <span id="table-title">数据表格</span>
        <span class="badge badge-client" id="mode-badge">Client</span>
      </h3>
      
      <!-- 控制面板 -->
      <div class="controls" id="controls">
        <!-- Client 模式控制 -->
        <div id="client-controls" style="display: flex; gap: 10px; width: 100%;">
          <button id="btn-client-reset">重置表格</button>
          <button class="secondary" id="btn-client-sort">按销售额排序</button>
        </div>
        
        <!-- Server 模式控制 -->
        <div id="server-controls" style="display: none; gap: 10px; width: 100%;">
          <input id="server-filter-input" placeholder="输入关键字筛选（回车生效）" />
          <button id="btn-server-filter-region">筛选：华东</button>
          <button id="btn-server-sort">销售额降序</button>
          <button class="secondary" id="btn-server-clear">清空筛选</button>
        </div>
      </div>
      
      <div id="table-container"></div>
      
      <!-- 统计信息 -->
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">当前模式</span>
          <span class="stat-value" id="stat-mode">Client</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">数据总量</span>
          <span class="stat-value" id="stat-total">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">可见行数</span>
          <span class="stat-value" id="stat-visible">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">加载状态</span>
          <span class="stat-value" id="stat-status">初始化中...</span>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="./src/demo.ts"></script>
</body>
</html>
